<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kw / film</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
  :root {
    --bg: #161412; --bg2: #1e1b18; --bg3: #252118;
    --cream: #e8dfd0; --muted: #7a6e61; --faint: #3a3228;
    --rust: #b85c38; --tape: #c8a96e;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; overflow-x: hidden; }
  body { background: var(--bg); color: var(--cream); font-family: 'Space Mono', monospace; min-height: 100vh; overflow-x: hidden; cursor: default; }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px; opacity: 0.04; mix-blend-mode: overlay;
  }

.page-wrap { max-width: 860px; margin: 0 auto; }
.strip-bleed { margin: 0 calc(-50vw + 50%); }
@media (max-width: 640px) { .strip-bleed { margin: 0; } }

header { padding: 1.6rem 2.4rem 1.2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--faint); }
.logo { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--cream); opacity: 0.7; }
.header-meta { font-size: 0.58rem; letter-spacing: 0.12em; color: var(--muted); }

.hero { padding: 3rem 2.4rem 0; opacity: 0; animation: fadeIn 0.7s ease forwards 0.15s; }
.hero-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; }
.hero-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.4rem, 5vw, 4.2rem); font-weight: 300; font-style: italic; line-height: 1; color: var(--cream); }
.hero-stats { text-align: right; padding-bottom: 0.2rem; }
.hero-stats-num { font-size: 1.8rem; color: var(--tape); line-height: 1; letter-spacing: -0.02em; }
.hero-stats-label { font-size: 0.52rem; letter-spacing: 0.2em; color: var(--muted); margin-top: 0.2rem; }

.strip-wrap { position: relative; margin: 0 -2.4rem; overflow: hidden; }
.strip-wrap::before, .strip-wrap::after { content: ''; position: absolute; top: 0; bottom: 0; width: 80px; z-index: 2; pointer-events: none; }
.strip-wrap::before { left: 0; background: linear-gradient(to right, var(--bg), transparent); }
.strip-wrap::after  { right: 0; background: linear-gradient(to left, var(--bg), transparent); }
.strip-holes { height: 14px; background: repeating-linear-gradient(to right, transparent 0px, transparent 18px, var(--bg3) 18px, var(--bg3) 30px, transparent 30px, transparent 48px); border-top: 1px solid var(--faint); border-bottom: 1px solid var(--faint); }
.strip-frames { display: flex; gap: 6px; padding: 6px 2.4rem; background: var(--bg3); animation: scrollStrip 90s linear infinite; width: max-content; }
.strip-frames:hover { animation-play-state: paused; }
.strip-frame { width: 200px; height: 140px; flex-shrink: 0; overflow: hidden; position: relative; }
.strip-frame::after { content: ''; position: absolute; inset: 0; box-shadow: inset 0 0 0 1px rgba(200,169,110,0.15), inset 0 0 12px rgba(0,0,0,0.4); pointer-events: none; }
.strip-frame img { width: 100%; height: 100%; object-fit: cover; filter: sepia(0.2) brightness(0.85); transition: filter 0.3s, transform 0.4s; display: block; }
.strip-frame:hover img { filter: sepia(0.05) brightness(1.0); transform: scale(1.04); }

.scroll-hint { padding: 0.9rem 2.4rem 0; font-size: 0.52rem; letter-spacing: 0.18em; color: var(--muted); opacity: 0; animation: fadeIn 0.8s ease forwards 0.7s; }

#home-view { display: block; }
#roll-view  { display: none; }

.rolls-header { padding: 2.8rem 2.4rem 1.4rem; display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--faint); }
.rolls-title { font-size: 0.6rem; letter-spacing: 0.25em; color: var(--muted); }
.rolls-count { font-size: 0.58rem; color: var(--muted); opacity: 0.5; }

.roll-row { display: grid; grid-template-columns: 80px 1fr auto; align-items: center; gap: 1.8rem; padding: 1.2rem 2.4rem; border-bottom: 1px solid var(--faint); cursor: pointer; transition: background 0.2s; opacity: 0; animation: rowIn 0.4s ease forwards; }
.roll-row:hover { background: var(--bg2); }
.roll-row:hover .roll-thumb img { filter: sepia(0.1) brightness(1.05); }
.roll-row:hover .roll-arrow { transform: translateX(4px); opacity: 1; }
.roll-thumb { width: 80px; height: 56px; overflow: hidden; flex-shrink: 0; position: relative; }
.roll-thumb::after { content: ''; position: absolute; inset: 0; box-shadow: inset 0 0 0 1px rgba(200,169,110,0.12); }
.roll-thumb img, .roll-thumb-ph { width: 100%; height: 100%; object-fit: cover; filter: sepia(0.2) brightness(0.9); transition: filter 0.3s; display: block; }
.roll-thumb-ph { background: var(--bg3); }
.roll-info { min-width: 0; }
.roll-label { font-size: 0.78rem; letter-spacing: 0.04em; color: var(--cream); margin-bottom: 0.35rem; }
.roll-sub { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.08em; display: flex; gap: 1.2rem; }
.roll-right { display: flex; align-items: center; gap: 1.2rem; flex-shrink: 0; }
.roll-frames { font-size: 0.58rem; color: var(--muted); opacity: 0.6; }
.roll-arrow { font-size: 0.65rem; color: var(--tape); opacity: 0.5; transition: transform 0.2s, opacity 0.2s; }

.roll-nav { padding: 1.4rem 2.4rem; display: flex; align-items: center; gap: 1.2rem; border-bottom: 1px solid var(--faint); }
.back-btn { font-size: 0.6rem; letter-spacing: 0.15em; color: var(--tape); cursor: pointer; background: none; border: none; font-family: 'Space Mono', monospace; padding: 0; opacity: 0.8; transition: opacity 0.2s; }
.back-btn:hover { opacity: 1; }
.nav-sep { color: var(--faint); font-size: 0.7rem; }
.roll-nav-label { font-size: 0.6rem; letter-spacing: 0.12em; color: var(--muted); }
.roll-view-header { padding: 2.4rem 2.4rem 1.6rem; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--faint); }
.roll-view-title { font-size: 1.1rem; letter-spacing: 0.04em; color: var(--cream); margin-bottom: 0.5rem; }
.roll-view-meta { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.1em; display: flex; gap: 1.5rem; }
.roll-view-count { font-size: 0.58rem; color: var(--muted); opacity: 0.5; }

.contact-sheet { padding: 2rem 2.4rem 4rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.8rem; }
.frame-cell { cursor: pointer; position: relative; opacity: 0; animation: rowInOdd 0.35s ease forwards; }
.frame-cell:nth-child(even) { animation-name: rowInEven; }
.frame-cell:nth-child(3n)   { animation-name: rowIn3n; }
.frame-cell:hover { z-index: 10; }
.frame-img-wrap { width: 100%; aspect-ratio: 3/2; overflow: hidden; background: var(--bg3); transition: transform 0.25s, box-shadow 0.25s; box-shadow: 2px 3px 10px rgba(0,0,0,0.5); }
.frame-cell:hover .frame-img-wrap { transform: scale(1.04); box-shadow: 4px 6px 20px rgba(0,0,0,0.7); }
.frame-img-wrap img, .frame-ph { width: 100%; height: 100%; object-fit: cover; filter: sepia(0.18) contrast(1.05) brightness(0.92); transition: filter 0.3s; display: block; }
.frame-cell:hover .frame-img-wrap img, .frame-cell:hover .frame-ph { filter: sepia(0.08) contrast(1.08) brightness(1.0); }
.frame-ph { display: flex; align-items: center; justify-content: center; background: var(--bg3); }
.frame-ph-label { font-size: 0.45rem; color: rgba(200,169,110,0.2); letter-spacing: 0.1em; }
.frame-num { margin-top: 0.35rem; font-size: 0.52rem; color: var(--muted); opacity: 0.6; padding-left: 2px; }

.lightbox { position: fixed; inset: 0; z-index: 1000; background: rgba(8,7,6,0.97); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.lightbox.open { opacity: 1; pointer-events: all; }
.lb-inner { display: flex; flex-direction: column; align-items: center; transform: scale(0.97); transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94); max-width: 90vw; }
.lightbox.open .lb-inner { transform: scale(1); }
.lb-img-wrap { max-width: min(85vw, 900px); max-height: 72vh; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
.lb-img-wrap img { display: block; max-width: 100%; max-height: 72vh; object-fit: contain; filter: sepia(0.12) contrast(1.06); }
.lb-ph { width: min(85vw, 900px); height: 60vh; display: flex; align-items: center; justify-content: center; background: var(--bg3); }
.lb-ph-label { font-size: 0.6rem; color: rgba(200,169,110,0.2); letter-spacing: 0.2em; }
.lb-footer { margin-top: 1.2rem; width: 100%; display: flex; justify-content: space-between; align-items: baseline; padding: 0 2px; }
.lb-caption { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-style: italic; font-weight: 300; color: var(--cream); opacity: 0.85; }
.lb-frame-id { font-size: 0.55rem; letter-spacing: 0.15em; color: var(--muted); opacity: 0.5; }
.lb-nav { position: fixed; top: 50%; transform: translateY(-50%); font-size: 0.6rem; letter-spacing: 0.1em; color: var(--tape); opacity: 0.5; cursor: pointer; background: none; border: none; font-family: 'Space Mono', monospace; transition: opacity 0.2s; padding: 1rem; }
.lb-nav:hover { opacity: 1; }
.lb-prev { left: 1rem; } .lb-next { right: 1rem; }
.lb-close { position: fixed; top: 1.5rem; right: 2rem; font-size: 0.58rem; letter-spacing: 0.15em; color: var(--muted); cursor: pointer; background: none; border: none; font-family: 'Space Mono', monospace; transition: color 0.2s; text-transform: uppercase; }
.lb-close:hover { color: var(--cream); }

@keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
@keyframes rowIn     { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes rowInOdd  { from { opacity:0; transform:translateY(8px) rotate(0.4deg); }  to { opacity:1; transform:rotate(0.4deg); } }
@keyframes rowInEven { from { opacity:0; transform:translateY(8px) rotate(-0.5deg); } to { opacity:1; transform:rotate(-0.5deg); } }
@keyframes rowIn3n   { from { opacity:0; transform:translateY(8px) rotate(0.7deg); }  to { opacity:1; transform:rotate(0.7deg); } }
@keyframes scrollStrip { from { transform:translateX(0); } to { transform:translateX(-50%); } }

@media (max-width: 640px) {
header, .rolls-header, .roll-row, .roll-nav, .roll-view-header, .contact-sheet { padding-left: 1.2rem; padding-right: 1.2rem; }
.contact-sheet { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
.roll-row { grid-template-columns: 64px 1fr auto; gap: 1rem; }
.roll-thumb { width: 64px; height: 44px; }
.hero { padding: 2rem 1.2rem 0; }
.strip-wrap { margin: 0 -1.2rem; }
}

/* ─────────────────────────────
   Desktop scale-up
   ───────────────────────────── */

@media (min-width: 1200px) {

  .page-wrap {
    max-width: 1100px;
  }

  header {
    padding: 2rem 3rem 1.5rem;
  }

  .hero {
    padding: 4rem 3rem 0;
  }

  .hero-name {
    font-size: clamp(3rem, 4vw, 5rem);
  }

  .hero-stats-num {
    font-size: 2.2rem;
  }

  .strip-frame {
    width: 240px;
    height: 168px;
  }

  .roll-row {
    padding: 1.6rem 3rem;
  }

  .contact-sheet {
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.2rem;
    padding: 2.5rem 3rem 5rem;
  }

  .lb-img-wrap {
    max-width: min(85vw, 1100px);
  }
}
  
</style>

</head>
<body>

<div class="page-wrap">
<header>
  <span class="logo">kw / film</span>
  <span class="header-meta">olympus xa2 · 35mm</span>
</header>

<div id="home-view">
  <section class="hero">
    <div class="hero-top">
      <div class="hero-name">keegan whitacre</div>
      <div class="hero-stats">
        <div class="hero-stats-num" id="total-frames">—</div>
        <div class="hero-stats-label">frames across <span id="total-rolls">—</span> rolls</div>
      </div>
    </div>
  </section>

  <div class="strip-wrap strip-bleed">
    <div class="strip-holes"></div>
    <div class="strip-frames" id="strip"></div>
    <div class="strip-holes"></div>
  </div>


  <div class="rolls-header">
    <span class="rolls-title">all rolls</span>
    <span class="rolls-count" id="roll-count"></span>
  </div>
  <div id="rolls-list"></div>
</div>

<div id="roll-view">
  <div class="roll-nav">
    <button class="back-btn" onclick="showHome()">← back</button>
    <span class="nav-sep">/</span>
    <span class="roll-nav-label" id="roll-nav-label"></span>
  </div>
  <div class="roll-view-header">
    <div>
      <div class="roll-view-title" id="rv-title"></div>
      <div class="roll-view-meta" id="rv-meta"></div>
    </div>
    <div class="roll-view-count" id="rv-count"></div>
  </div>
  <div class="contact-sheet" id="contact-sheet"></div>
</div>

</div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLB()">close ✕</button>
  <button class="lb-nav lb-prev" onclick="navLB(-1)">← prev</button>
  <button class="lb-nav lb-next" onclick="navLB(1)">next →</button>
  <div class="lb-inner">
    <div class="lb-img-wrap" id="lb-img-wrap"></div>
    <div class="lb-footer">
      <span class="lb-caption" id="lb-caption"></span>
      <span class="lb-frame-id" id="lb-frame-id"></span>
    </div>
  </div>
</div>

<script>
const R2_BASE = 'https://images.keeganwhitacre.com';

let rolls = [];
let currentRoll = null;
let lbIndex = 0;

async function init() {
  try {
    const res = await fetch('rolls.json');
    rolls = await res.json();
    buildStrip();
    renderRolls();
  } catch(e) {
    console.error('Could not load rolls.json', e);
  }
}

function buildStrip() {
  const strip = document.getElementById('strip');

  // Pick up to 6 random frame numbers from each roll
  const frames = [];
  rolls.forEach(r => {
    const count = Math.min(r.frames, 6);
    const picks = new Set();
    while (picks.size < count) {
      picks.add(Math.floor(Math.random() * r.frames) + 1);
    }
    picks.forEach(n => {
      frames.push({
        src: `${R2_BASE}/${r.id}/${String(n).padStart(3, '0')}.jpg`,
        label: r.label
      });
    });
  });

  // Shuffle
  frames.sort(() => Math.random() - 0.5);

  // Duplicate for seamless loop
  [...frames, ...frames].forEach(f => {
    const div = document.createElement('div');
    div.className = 'strip-frame';
    div.innerHTML = `<img src="${f.src}" alt="${f.label}" loading="lazy">`;
    strip.appendChild(div);
  });
}

function renderRolls() {
  const list = document.getElementById('rolls-list');
  const totalFrames = rolls.reduce((sum, r) => sum + r.frames, 0);
  document.getElementById('roll-count').textContent = `${rolls.length} rolls · ${totalFrames} frames`;
  document.getElementById('total-frames').textContent = totalFrames;
  document.getElementById('total-rolls').textContent = rolls.length;

  list.innerHTML = '';
  rolls.forEach((roll, i) => {
    const row = document.createElement('div');
    row.className = 'roll-row';
    row.style.animationDelay = `${0.05 + i * 0.06}s`;
    row.innerHTML = `
      <div class="roll-thumb">
        <img src="${R2_BASE}/${roll.cover}" alt="${roll.label}" loading="lazy"
             onerror="this.outerHTML='<div class=roll-thumb-ph></div>'">
      </div>
      <div class="roll-info">
        <div class="roll-label">${roll.label}</div>
        <div class="roll-sub">
          <span>${roll.date}</span><span style="opacity:.3">·</span><span>${roll.stock}</span>
        </div>
      </div>
      <div class="roll-right">
        <span class="roll-frames">${roll.frames} frames</span>
        <span class="roll-arrow">→</span>
      </div>`;
    row.addEventListener('click', () => openRoll(roll));
    list.appendChild(row);
  });
}

function openRoll(roll) {
  currentRoll = roll;
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('roll-view').style.display = 'block';
  window.scrollTo(0, 0);
  document.getElementById('roll-nav-label').textContent = roll.label;
  document.getElementById('rv-title').textContent = roll.label;
  document.getElementById('rv-meta').innerHTML =
    `<span>${roll.date}</span><span style="opacity:.3">·</span><span>${roll.stock}</span>`;
  document.getElementById('rv-count').textContent = `${roll.frames} frames`;

  const sheet = document.getElementById('contact-sheet');
  sheet.innerHTML = '';
  for (let i = 0; i < roll.frames; i++) {
    const num = String(i + 1).padStart(3, '0');
    const src = `${R2_BASE}/${roll.id}/${num}.jpg`;
    const cell = document.createElement('div');
    cell.className = 'frame-cell';
    cell.style.animationDelay = `${i * 0.025}s`;
    cell.innerHTML = `
      <div class="frame-img-wrap">
        <img src="${src}" alt="frame ${num}" loading="lazy"
             onerror="this.outerHTML='<div class=frame-ph><span class=frame-ph-label>${num}</span></div>'">
      </div>
      <div class="frame-num">${num}</div>`;
    cell.addEventListener('click', () => openLB(i));
    sheet.appendChild(cell);
  }
}

function showHome() {
  document.getElementById('roll-view').style.display = 'none';
  document.getElementById('home-view').style.display = 'block';
  window.scrollTo(0, 0);
}

function openLB(index) {
  lbIndex = index;
  renderLB();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderLB() {
  const num = String(lbIndex + 1).padStart(3, '0');
  const src = `${R2_BASE}/${currentRoll.id}/${num}.jpg`;
  document.getElementById('lb-img-wrap').innerHTML =
    `<img src="${src}" alt="frame ${num}"
       onerror="this.outerHTML='<div class=lb-ph><span class=lb-ph-label>unavailable</span></div>'">`;
  document.getElementById('lb-caption').textContent = '';
  document.getElementById('lb-frame-id').textContent = `${currentRoll.id} · ${num}`;
}

function navLB(dir) {
  lbIndex = (lbIndex + dir + currentRoll.frames) % currentRoll.frames;
  renderLB();
}

function closeLB() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLB();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape')     closeLB();
  if (e.key === 'ArrowRight') navLB(1);
  if (e.key === 'ArrowLeft')  navLB(-1);
});

init();
</script>

</body>
</html>
